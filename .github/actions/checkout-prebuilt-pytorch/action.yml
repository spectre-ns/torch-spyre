name: Checkout pytorch in pre-cloned image
description: |
  Re-points the pre-cloned pytorch source tree at the release branch that
  matches the torch version pinned in torch-spyre's pyproject.toml.

  The image_torch_spyre runner image bakes in /home/senuser/pytorch at
  whatever ref existed when the image was built. Tests run via TORCH_ROOT
  consume that source tree, so when a torch-spyre PR bumps the torch
  version (e.g. 2.11 -> 2.12) the source must be re-pointed to match the
  newly-installed wheel — otherwise upstream tests run against drifted
  source against a newer wheel.

  Skips the fetch when the clone is already on the right branch, so the
  steady-state cost is one git ref check per CI run.

inputs:
  cloned-dir:
    description: Path to the pre-cloned torch-spyre directory in the image.
    required: false
    default: /home/senuser/torch-spyre
  torch-root:
    description: Path to the pre-cloned pytorch directory in the image.
    required: false
    default: /home/senuser/pytorch

runs:
  using: composite
  steps:
    - name: Re-checkout pytorch at release branch matching pyproject.toml
      shell: bash
      env:
        CLONED_TORCH_SPYRE_DIR: ${{ inputs.cloned-dir }}
        TORCH_ROOT: ${{ inputs.torch-root }}
      run: |
        source "$HOME/.bashrc"
        source /etc/profile.d/ibm-aiu-setup.sh
        # The pre-cloned repos may be owned by a different user than the
        # runner process; mark all directories as safe (covers the repo
        # and any submodules).
        git config --global --add safe.directory '*'

        # Derive the target pytorch release branch from torch-spyre's
        # pyproject.toml — single source of truth. The same script is used
        # by the runner-image build pipeline (spyre-runtimes Dockerfile) to
        # pick TORCH_MINOR for the pre-cloned pytorch tree, so this action
        # always agrees with the image on what `release/X.Y` means. The
        # script uses stdlib only (re + tomllib), so no venv activation
        # needed here.
        cd "$CLONED_TORCH_SPYRE_DIR"
        VERSION=$(python3 tools/get_torch_minor.py pyproject.toml)
        TARGET_BRANCH="release/${VERSION}"
        echo "TARGET_BRANCH=${TARGET_BRANCH}"

        cd "$TORCH_ROOT"
        echo "Pre-baked pytorch state:"
        git log -1 --oneline || true

        # Determine the current ref. Try branch name first, then any
        # symbolic ref name (e.g. tags/v2.11.0), then fall back to SHA.
        CURRENT_BRANCH=$(git symbolic-ref --short -q HEAD || true)
        if [[ "${CURRENT_BRANCH}" == "${TARGET_BRANCH}" ]]; then
          echo "pytorch already on ${TARGET_BRANCH} — skipping fetch."
          exit 0
        fi

        echo "pytorch not on ${TARGET_BRANCH} (current: '${CURRENT_BRANCH:-detached}'); fetching."
        git fetch --depth=1 --force origin \
          "+refs/heads/${TARGET_BRANCH}:refs/heads/${TARGET_BRANCH}"
        git checkout --force "${TARGET_BRANCH}"
        git submodule sync --recursive
        git submodule update --init --recursive --force --depth=1
        echo "pytorch now on ${TARGET_BRANCH}:"
        git log -1 --oneline
