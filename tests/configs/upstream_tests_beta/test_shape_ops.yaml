test_suite_config:
  files:
    - path: ${TORCH_ROOT}/test/test_shape_ops.py
      unlisted_test_mode: skip
      tests:
        - names:
            - TestShapeOps::test_clamp_raises_arg_errors
            - TestShapeOps::test_nonzero_non_diff
            - TestShapeOps::test_unfold_errors
          mode: mandatory_success
  global:
    supported_dtypes:
      - name: float16
        description: Supported by both Spyre and CPU. Required floating point dtype for the test.
      - name: int64
        description: Supported by both Spyre and CPU. Required floating point dtype for the test.
      - name: bfloat16
        description: Supported by both Spyre and CPU. Required floating point dtype for the test.

