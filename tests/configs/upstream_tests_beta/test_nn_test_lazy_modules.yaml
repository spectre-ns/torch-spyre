test_suite_config:
  files:
    - path: ${TORCH_ROOT}/test/nn/test_lazy_modules.py
      unlisted_test_mode: skip
      tests:
        - names:
            - TestLazyModules::test_materialize_dtype
          mode: mandatory_success
  global:
    supported_dtypes:
      - name: float16
        description: Supported by both Spyre and CPU. Required floating point dtype for the test.
      - name: int64
        description: Supported by both Spyre and CPU. Required floating point dtype for the test.
      - name: bfloat16
        description: Supported by both Spyre and CPU. Required floating point dtype for the test.
